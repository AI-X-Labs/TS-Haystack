# TS-Haystack Dataset Generation Configuration
# =============================================
# All values shown are defaults from the implementation.
# Copy and modify as needed for your experiment.

# ------------------------------------------------------------------------------
# Global Settings
# ------------------------------------------------------------------------------
global:
  seed: 42                              # Master seed for reproducibility
  n_jobs: 4                             # Parallel workers for generation
  output_dir: data/capture24/ts_haystack/tasks
  overwrite: false                      # Overwrite existing files
  source_hz: 100                        # Capture24 sampling rate

# ------------------------------------------------------------------------------
# Context Lengths (in SECONDS for human readability)
# Converted internally: seconds * source_hz = samples
# Example: 100s @ 100Hz = 10,000 samples
# ------------------------------------------------------------------------------
context_lengths_seconds:
  - 2.56
  - 10
  - 100
  - 900
  - 3600
  - 7200

# ------------------------------------------------------------------------------
# Samples per Split
# ------------------------------------------------------------------------------
samples:
  # PRODUCTION SETTINGS
  # train: 1000
  # val: 150
  # test: 150

  # DEVELOPMENT SETTINGS
  train: 1000
  val: 150
  test: 150

# ------------------------------------------------------------------------------
# Style Transfer Settings (applied during needle insertion)
# ------------------------------------------------------------------------------
style_transfer:
  transfer_mode: mean_only              # "mean_only" (recommended) or "full"
  blend_mode: cosine                    # "cosine" or "linear"
  blend_window_samples: 50              # Samples for boundary blending (~0.5s)

# ------------------------------------------------------------------------------
# Task Configurations
# ------------------------------------------------------------------------------
# Each task has its own difficulty settings.
# Set enabled: false to skip a task.
# needle_length_ratio_range: [min, max] as fraction of context (e.g., 0.02 = 2%)

tasks:

  # --------------------------------------------------------------------------
  # Task 1: Existence
  # "Is there {activity} in this recording?"
  # Uses distractor insertion to prevent variance-based detection shortcuts.
  # Multiple needles from the SAME activity regime are inserted.
  # --------------------------------------------------------------------------
  existence:
    enabled: true
    needle_position: random             # "random", "beginning", "middle", "end"
    needle_length_ratio_range: [0.02, 0.10]  # 2-10% of context
    background_purity: any              # "pure", "mixed", or "any" (random window, adapts to context length)
    # Adaptive margin/gap parameters (ratio-based with max cap)
    margin_ratio: 0.02                  # 2% of context length
    margin_max_samples: 100             # Cap at 100 samples for longer contexts
    min_gap_ratio: 0.02                 # 2% of context length
    min_gap_max_samples: 100            # Cap at 100 samples
    # Distractor insertion parameters
    min_distractors: 1                  # Minimum number of needles to insert
    max_distractors: 3                  # Maximum number of needles to insert

  # --------------------------------------------------------------------------
  # Task 2: Localization
  # "When did the {activity} bout occur?"
  # Uses distractor insertion to prevent variance-based detection shortcuts.
  # Multiple needles from the SAME activity regime are inserted.
  # --------------------------------------------------------------------------
  localization:
    enabled: true
    needle_position: random
    needle_length_ratio_range: [0.02, 0.10]
    background_purity: any              # "pure", "mixed", or "any"
    # Adaptive margin/gap parameters (ratio-based with max cap)
    margin_ratio: 0.02
    margin_max_samples: 100
    min_gap_ratio: 0.02
    min_gap_max_samples: 100
    # Distractor insertion parameters
    min_distractors: 1                  # Minimum needles (at least 2 for distractors)
    max_distractors: 3                  # Maximum number of needles to insert

  # --------------------------------------------------------------------------
  # Task 3: Counting
  # "How many {activity} bouts occurred?"
  # --------------------------------------------------------------------------
  counting:
    enabled: true
    needle_position: random
    needle_length_ratio_range: [0.02, 0.08]   # Smaller for multiple needles
    background_purity: any              # "pure", "mixed", or "any"
    # Adaptive margin/gap parameters (ratio-based with max cap)
    margin_ratio: 0.02
    margin_max_samples: 100
    min_gap_ratio: 0.02
    min_gap_max_samples: 100
    # Task-specific parameters
    min_bouts: 1                        # Minimum bouts to insert
    max_bouts: 5                        # Maximum bouts to insert

  # --------------------------------------------------------------------------
  # Task 4: Ordering
  # "Did {activity_a} occur before {activity_b}?"
  # --------------------------------------------------------------------------
  ordering:
    enabled: true
    needle_position: random
    needle_length_ratio_range: [0.02, 0.10]
    background_purity: any              # "pure", "mixed", or "any"
    # Adaptive margin/gap parameters (ratio-based with max cap)
    margin_ratio: 0.02
    margin_max_samples: 100
    min_gap_ratio: 0.02
    min_gap_max_samples: 100
    # Task-specific parameters
    question_format: category            # "boolean" or "category"

  # --------------------------------------------------------------------------
  # Task 5: State Query (Cross-Scale)
  # "What was the activity level when {event} occurred?"
  # NOTE: background_purity is HARDCODED to "mixed" for this task
  # --------------------------------------------------------------------------
  state_query:
    enabled: true
    needle_position: random
    needle_length_ratio_range: [0.01, 0.05]   # Smaller - local event in global context
    # background_purity: mixed          # HARDCODED - cannot be changed
    min_global_states: 2                # Minimum activity states in background
    max_global_states: 5                # Maximum activity states
    # Adaptive min state duration (ratio-based with max cap)
    min_state_duration_ratio: 0.20      # 20% of context length
    min_state_duration_max_samples: 500 # Cap at 500 samples for longer contexts
    position_mode: random               # "random", "center", "near_boundary"
    boundary_margin_frac: 0.1           # Margin from state boundaries (fraction)

  # --------------------------------------------------------------------------
  # Task 6: Antecedent
  # "What activity occurred before {target}?"
  # --------------------------------------------------------------------------
  antecedent:
    enabled: true
    needle_position: random
    needle_length_ratio_range: [0.02, 0.08]   # Two needles need to fit
    background_purity: any              # "pure", "mixed", or "any"
    # Adaptive margin/gap parameters (ratio-based with max cap)
    margin_ratio: 0.02
    margin_max_samples: 100
    # Task-specific parameters
    background_mode: low_activity       # "low_activity" (forces pure) or "mixed"
    adjacency_gap_samples: 10           # Gap between antecedent and target
    use_transition_probs: false         # Use transition matrix for activity pairing

  # --------------------------------------------------------------------------
  # Task 7: Comparison
  # "What was the longest/shortest period with/without {activity}?"
  # --------------------------------------------------------------------------
  comparison:
    enabled: true
    needle_position: random
    needle_length_ratio_range: [0.02, 0.08]   # Multiple needles
    background_purity: any              # "pure", "mixed", or "any"
    # Adaptive margin/gap parameters (ratio-based with max cap)
    margin_ratio: 0.02
    margin_max_samples: 100
    min_gap_ratio: 0.02
    min_gap_max_samples: 100
    # Task-specific parameters
    min_bouts: 2                        # Minimum bouts to compare
    max_bouts: 4                        # Maximum bouts
    # Adaptive duration diff (ratio-based with max cap)
    min_duration_diff_ratio: 0.02       # 2% of context as minimum difference
    min_duration_diff_max_ms: 2000      # Cap at 2000ms for longer contexts

  # --------------------------------------------------------------------------
  # Task 8: Multi-Hop
  # "When did the Kth {target} occur after {anchor}?"
  # --------------------------------------------------------------------------
  multi_hop:
    enabled: true
    needle_position: random
    needle_length_ratio_range: [0.02, 0.06]   # Multiple needles + anchor
    background_purity: any              # "pure", "mixed", or "any"
    # Adaptive margin/gap parameters (ratio-based with max cap)
    margin_ratio: 0.02
    margin_max_samples: 100
    min_gap_ratio: 0.02
    min_gap_max_samples: 100
    # Task-specific parameters
    k_distribution: [0.4, 0.4, 0.2]     # P(K=1), P(K=2), P(K=3)
    direction_mode: random              # "random", "after_only", "before_only"
    n_distractors_opposite: 0           # Distractor targets on opposite side

  # --------------------------------------------------------------------------
  # Task 9: Anomaly Detection
  # "Is there an anomaly in this recording?"
  # Tests contextual reasoning: detecting cross-regime activity insertions
  # without being told what to look for.
  #
  # Sample design (mandatory distractors to prevent detection shortcuts):
  # - Positive: 1 cross-regime (anomaly) + N same-regime distractors
  # - Negative: N same-regime distractors only (no anomaly)
  # --------------------------------------------------------------------------
  anomaly_detection:
    enabled: true
    needle_position: random
    needle_length_ratio_range: [0.03, 0.15]  # 3-15% of context
    background_purity: pure              # MUST be pure for regime detection
    # Adaptive margin/gap parameters (ratio-based with max cap)
    margin_ratio: 0.02
    margin_max_samples: 100
    min_gap_ratio: 0.02
    min_gap_max_samples: 100
    # Task-specific parameters
    min_distractors: 1                   # Minimum same-regime distractors (mandatory)
    max_distractors: 3                   # Maximum same-regime distractors

  # --------------------------------------------------------------------------
  # Task 10: Anomaly Localization
  # "Is there an anomaly, and if so, when does it occur?"
  # Combines anomaly detection with temporal localization.
  #
  # Sample design (mandatory distractors to prevent detection shortcuts):
  # - Positive: 1 cross-regime (anomaly) + N same-regime distractors + time range
  # - Negative: N same-regime distractors only (no anomaly)
  # --------------------------------------------------------------------------
  anomaly_localization:
    enabled: true
    needle_position: random
    needle_length_ratio_range: [0.03, 0.15]  # 3-15% of context
    background_purity: pure              # MUST be pure for regime detection
    # Adaptive margin/gap parameters (ratio-based with max cap)
    margin_ratio: 0.02
    margin_max_samples: 100
    min_gap_ratio: 0.02
    min_gap_max_samples: 100
    # Task-specific parameters
    min_distractors: 1                   # Minimum same-regime distractors (mandatory)
    max_distractors: 3                   # More distractors make localization harder
